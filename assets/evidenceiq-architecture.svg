<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">EvidenceIQ Architecture</title>
  <desc id="desc">Pipeline from raw evidence to cited investigation outputs.</desc>
  <defs>
    <style>
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .muted { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .accent { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
      .green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .amber { fill: #fffbeb; stroke: #d97706; stroke-width: 2; }
      .line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <text x="60" y="70" class="label" font-size="38" font-weight="800">How EvidenceIQ Works</text>
  <text x="60" y="105" class="muted" font-size="20">A citation-first pipeline for turning raw files into defensible investigation outputs.</text>

  <rect x="60" y="160" width="190" height="115" rx="18" class="card"/>
  <text x="88" y="202" class="label" font-size="23" font-weight="800">Raw Evidence</text>
  <text x="88" y="235" class="muted" font-size="17">Emails, notes, CSVs,</text>
  <text x="88" y="258" class="muted" font-size="17">PDFs, reports</text>

  <rect x="305" y="160" width="190" height="115" rx="18" class="accent"/>
  <text x="333" y="202" class="label" font-size="23" font-weight="800">Parser</text>
  <text x="333" y="235" class="muted" font-size="17">Normalize, hash,</text>
  <text x="333" y="258" class="muted" font-size="17">deduplicate</text>

  <rect x="550" y="160" width="190" height="115" rx="18" class="green"/>
  <text x="578" y="202" class="label" font-size="23" font-weight="800">Intelligence</text>
  <text x="578" y="235" class="muted" font-size="17">Entities, search,</text>
  <text x="578" y="258" class="muted" font-size="17">graph, timeline</text>

  <rect x="795" y="160" width="190" height="115" rx="18" class="amber"/>
  <text x="823" y="202" class="label" font-size="23" font-weight="800">Agent Tools</text>
  <text x="823" y="235" class="muted" font-size="17">Retrieve first, cite,</text>
  <text x="823" y="258" class="muted" font-size="17">refuse unsupported</text>

  <rect x="1010" y="148" width="130" height="140" rx="18" fill="#0f172a"/>
  <text x="1034" y="194" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Outputs</text>
  <text x="1034" y="228" fill="#bae6fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Answers</text>
  <text x="1034" y="251" fill="#bae6fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Risk leads</text>
  <text x="1034" y="274" fill="#bae6fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Memos</text>

  <path d="M250 218 H305" class="line"/>
  <path d="M495 218 H550" class="line"/>
  <path d="M740 218 H795" class="line"/>
  <path d="M985 218 H1010" class="line"/>

  <rect x="145" y="350" width="910" height="86" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="180" y="386" class="label" font-size="22" font-weight="800">Safety layer</text>
  <text x="180" y="418" class="muted" font-size="18">No unsupported claims. No guilt/fraud/legal conclusions. Every finding points back to source evidence.</text>
</svg>
